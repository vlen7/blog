<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{description}}">
<title>{{title}} — 微冷</title>
<style>
  :root {
    --bg: #fdfdfc;
    --text: #2c2c2c;
    --text-muted: #787878;
    --accent: #b87333;
    --border: #e8e4df;
    --code-bg: #f5f3ef;
    --max-w: 680px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --text: #d4d4d0;
      --text-muted: #8a8a84;
      --accent: #d4893b;
      --border: #333330;
      --code-bg: #2a2a28;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.85; -webkit-font-smoothing: antialiased;
  }
  .container { max-width: var(--max-w); margin: 0 auto; padding: 2rem 1.2rem; }
  header { padding: 2rem 0 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
  header .back { font-size: 0.85rem; color: var(--text-muted); text-decoration: none; }
  header .back:hover { color: var(--accent); }
  h1 { font-size: 1.6rem; font-weight: 700; margin: 0.5rem 0; letter-spacing: -0.02em; }
  .meta { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 2rem; }
  article { font-size: 1rem; }
  article p { margin-bottom: 1.2rem; }
  article h2 { font-size: 1.2rem; margin: 2rem 0 0.8rem; }
  article a { color: var(--accent); text-decoration: none; }
  article blockquote {
    border-left: 3px solid var(--accent);
    margin: 1.2rem 0;
    padding: 0.4rem 1rem;
    color: var(--text-muted);
    background: var(--code-bg);
    border-radius: 0 4px 4px 0;
  }
  article code {
    background: var(--code-bg);
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    font-size: 0.9em;
  }
  article pre {
    background: var(--code-bg);
    padding: 1rem 1.2rem;
    border-radius: 6px;
    overflow-x: auto;
    margin: 1.2rem 0;
    font-size: 0.88rem;
    line-height: 1.6;
  }
  article pre code { background: none; padding: 0; }
  article img { max-width: 100%; height: auto; border-radius: 4px; }
  footer {
    margin-top: 3rem; padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    text-align: center; font-size: 0.8rem; color: var(--text-muted);
  }
  footer a { color: var(--accent); text-decoration: none; }
  @media (max-width: 480px) {
    .container { padding: 1.2rem 1rem; }
    h1 { font-size: 1.35rem; }
  }
</style>
</head>
<body>
<div class="container">
<header>
  <a href="/" class="back">← 返回首页</a>
  <h1>{{title}}</h1>
  <div class="meta">{{date}}</div>
</header>

<article>
{{content}}
</article>

<footer>
  <p><a href="/">hehan.tech</a> · Powered by plain HTML</p>
</footer>
</div>
</body>
</html>
